services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory
    ports:
      # exposed for local development (npm run dev); 5433 to avoid clashing with a host Postgres
      - "5433:5432"
    volumes:
      - memory_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory"]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://memory:memory@db:5432/memory
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      COMPLETION_MODEL: ${COMPLETION_MODEL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  memory_data:
